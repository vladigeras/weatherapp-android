name: release
on:
  release:
    types: [published]
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Get release tag
        id: release_tag
        run: |
          echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
      - name: Build Release APK
        run: ./gradlew assembleRelease
      - name: Locate Release APK
        id: locate_apk
        run: |
          echo "APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)" >> $GITHUB_OUTPUT
      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.locate_apk.outputs.APK_PATH }}
          asset_name: weatherapp-android-${{ steps.release_tag.outputs.TAG }}.apk
          asset_content_type: application/vnd.android.package-archive
          overwrite: true