name: release
on:
  release:
    types: [published]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Get release tag
        id: release_tag
        run: |
          echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          chmod 600 app/release.keystore
          file app/release.keystore
          ls -la app/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Verify Keystore
        run: |
          echo "Keystore size: $(wc -c < app/release.keystore) bytes"
          head -c 100 app/release.keystore | xxd | head -5
          keytool -list -keystore app/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" || echo "Keytool failed"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ../app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK Build
        run: |
          echo "Verifying APK build output..."
          ls -la app/build/outputs/apk/release/

      - name: Locate Release APK
        id: locate_apk
        run: |
          echo "Searching for APK file..."
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK file found in app/build/outputs/apk/release/"
            echo "Directory contents:"
            ls -la app/build/outputs/apk/release/
            exit 1
          fi
          echo "FOUND APK: $APK_FILE"
          echo "APK_PATH=$APK_FILE" >> $GITHUB_OUTPUT

      - name: Debug APK Location
        run: |
          echo "APK path to be used: ${{ steps.locate_apk.outputs.APK_PATH }}"
          if [ -f "${{ steps.locate_apk.outputs.APK_PATH }}" ]; then
            echo "APK file exists and is readable"
            ls -la "${{ steps.locate_apk.outputs.APK_PATH }}"
          else
            echo "ERROR: APK file does not exist at path: ${{ steps.locate_apk.outputs.APK_PATH }}"
            exit 1
          fi

      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.locate_apk.outputs.APK_PATH }}
          asset_name: weatherapp-android-${{ steps.release_tag.outputs.TAG }}.apk
          overwrite: true